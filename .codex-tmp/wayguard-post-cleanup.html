  from {

    opacity: 0;

  }



  to {

    opacity: 1;

}

/* 빨간색 경고등 깜빡임 애니메이션 */
@keyframes pulse-red {
  0% {
    transform: scale(0.95);
    box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
  }
  70% {
    transform: scale(1);

  }
  100% {
    transform: scale(0.95);
    box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
  }
}

.animate-pulse-red {
  animation: pulse-red 2s infinite;
